name: "Stale Management"

on:
  schedule:
    - cron: '0 0 * * *'  # Run daily

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue is outdated. Please confirm if it still needs to be addressed.'
          stale-pr-message: 'This PR is outdated. Please update or close it.'
          days-before-stale: 60
          days-before-close: 7
